name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test --maxWorkers=2 --coverage

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  nitrogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Regenerate Nitro specs
        run: yarn specs

      - name: Verify committed nitrogen output is up to date
        run: |
          git diff --exit-code nitrogen/ \
            || (echo "::error::nitrogen/ is out of date — run 'yarn specs' and commit the result." && exit 1)

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null" || true

      - name: Install example dependencies
        working-directory: example
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build example for Android
        working-directory: example
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: npm run build:android

  build-ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install example dependencies
        working-directory: example
        run: npm install --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods
        working-directory: example/ios
        # Regenerate from scratch: the cached Pods/Podfile.lock are from the
        # pre-0.75 example and conflict (e.g. boost) after the RN upgrade.
        # RN 0.83 dropped JSC from core — Hermes is required, so do NOT set
        # USE_HERMES=0 anymore.
        run: rm -rf Pods Podfile.lock && pod install
        env:
          NO_FLIPPER: 1
          RCT_NEW_ARCH_ENABLED: '1'

      - name: Build example for iOS
        working-directory: example
        run: npm run build:ios
