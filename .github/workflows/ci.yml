name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test --maxWorkers=2 --coverage

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build package
        run: yarn prepare

  nitrogen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Regenerate Nitro specs
        run: yarn specs

      - name: Verify committed nitrogen output is up to date
        run: |
          git diff --exit-code nitrogen/ \
            || (echo "::error::nitrogen/ is out of date — run 'yarn specs' and commit the result." && exit 1)

  build-android:
    runs-on: ubuntu-latest
    # Non-blocking: the example app must be upgraded to React Native 0.75+ and
    # add react-native-nitro-modules before the Nitro module can build here.
    # Tracked as a follow-up so it does not block the library PR.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Finalize Android SDK
        run: |
          /bin/bash -c "yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null" || true

      - name: Install example dependencies
        working-directory: example
        run: npm install --legacy-peer-deps

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('example/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run library Android unit tests
        working-directory: example/android
        run: ./gradlew :react-native-ssl-manager:testDebugUnitTest --no-daemon --console=plain

      - name: Build example for Android
        working-directory: example
        env:
          JAVA_OPTS: "-XX:MaxHeapSize=6g"
        run: npm run build:android

  build-ios:
    runs-on: macos-14
    # Non-blocking: the example app must be upgraded to React Native 0.75+ and
    # add react-native-nitro-modules (and needs Xcode 16.4+) before the Nitro
    # module can build here. Also tracks the pre-existing Hermes script-phase
    # issue. Tracked as a follow-up so it does not block the library PR.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install example dependencies
        working-directory: example
        run: npm install --legacy-peer-deps

      - name: Cache CocoaPods
        uses: actions/cache@v3
        with:
          path: example/ios/Pods
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('example/ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-cocoapods-

      - name: Install CocoaPods
        working-directory: example/ios
        run: pod install
        env:
          NO_FLIPPER: 1
          USE_HERMES: '0'
          RCT_NEW_ARCH_ENABLED: '1'

      - name: Build example for iOS
        working-directory: example
        env:
          USE_HERMES: '0'
        run: npm run build:ios
